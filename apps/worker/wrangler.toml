# Two workers run the SAME source — each deploy hardcodes WORKER_ROLE so the
# entrypoint dispatch routes correctly even when a worker terminates more than
# one hostname (custom domain + *.workers.dev fallback).
#
# Deploy:
#   wrangler deploy --env api    → api.qhs.fyi + qhs-api.desperli.workers.dev
#   wrangler deploy --env share  → s.qhs.fyi   + qhs-share.desperli.workers.dev
#
# Both envs bind the same D1 + R2.
name = "quick-html-sharing"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# === API worker — dashboard role, handles /api/* + cron =====================
[env.api]
name = "qhs-api"
workers_dev = true
routes = [
  { pattern = "api.qhs.fyi", custom_domain = true }
]
# DASHBOARD_HOST is where the dashboard actually lives TODAY (free deploy on
# Pages at qhs.fyi) — it feeds the watermark Report link and the CORS
# allowlist. Flip to app.qhs.fyi when the production mapping lands.
vars = { WORKER_ROLE = "dashboard", DASHBOARD_HOST = "qhs.fyi", SHARE_HOST = "s.qhs.fyi" }

[[env.api.d1_databases]]
binding = "DB"
database_name = "quick-html-sharing"
database_id = "abc8df6d-3fd3-4331-84a1-5974299d6666"

[[env.api.r2_buckets]]
binding = "HTML_BUCKET"
bucket_name = "quick-html-sharing"

# Cleanup cron only runs on api env — running it on both wastes invocations
# and can race when sweeping pending rows.
[env.api.triggers]
crons = ["*/10 * * * *"]

# My Shares rate limits — two namespaces on the same (free) binding: IP layer
# is the abuse floor, key layer keeps one noisy key from draining a shared
# IP's budget. api env only; middleware fail-opens where these are absent.
# Limits mirror MY_SHARES_RATE_LIMIT_* in packages/shared.
[[env.api.ratelimits]]
name = "MY_SHARES_RATE_LIMIT_IP"
namespace_id = "1001"

  [env.api.ratelimits.simple]
  limit = 60
  period = 60

[[env.api.ratelimits]]
name = "MY_SHARES_RATE_LIMIT_KEY"
namespace_id = "1002"

  [env.api.ratelimits.simple]
  limit = 30
  period = 60

# === Share worker — share role, renders user HTML at /:slug =================
[env.share]
name = "qhs-share"
workers_dev = true
routes = [
  { pattern = "s.qhs.fyi", custom_domain = true }
]
vars = { WORKER_ROLE = "share", DASHBOARD_HOST = "qhs.fyi", SHARE_HOST = "s.qhs.fyi" }

[[env.share.d1_databases]]
binding = "DB"
database_name = "quick-html-sharing"
database_id = "abc8df6d-3fd3-4331-84a1-5974299d6666"

[[env.share.r2_buckets]]
binding = "HTML_BUCKET"
bucket_name = "quick-html-sharing"
