# Default config — not for plain `wrangler deploy`. Always deploy with one of:
#   wrangler deploy --env api    → qhs-api.<your-account>.workers.dev
#   wrangler deploy --env share  → qhs-share.<your-account>.workers.dev
#
# Two workers run the SAME code. Each receives its own *.workers.dev origin.
# That gives us the subdomain isolation property the architecture depends on,
# without needing a custom domain. Both bind to the same D1 + R2.
name = "quick-html-sharing"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# ----------------------------------------------------------------------------
# After registering a real domain, replace the [env.api]/[env.share] blocks
# below with a single production block + `routes = [...]`. Until then, free
# .workers.dev origins are fine for dogfood with friends.
# ----------------------------------------------------------------------------

# === API worker — dashboard host, handles /api/* ============================
[env.api]
name = "qhs-api"
workers_dev = true
vars = { DASHBOARD_HOST = "qhs-6ft.pages.dev", SHARE_HOST = "qhs-share.desperli.workers.dev" }

[[env.api.d1_databases]]
binding = "DB"
database_name = "quick-html-sharing"
database_id = "abc8df6d-3fd3-4331-84a1-5974299d6666"

[[env.api.r2_buckets]]
binding = "HTML_BUCKET"
bucket_name = "quick-html-sharing"

# Cleanup cron only runs on api env — running it on both wastes invocations
# and can race when sweeping pending rows.
[env.api.triggers]
crons = ["*/10 * * * *"]

# === Share worker — share host, handles /:slug ==============================
[env.share]
name = "qhs-share"
workers_dev = true
vars = { DASHBOARD_HOST = "qhs-6ft.pages.dev", SHARE_HOST = "qhs-share.desperli.workers.dev" }

[[env.share.d1_databases]]
binding = "DB"
database_name = "quick-html-sharing"
database_id = "abc8df6d-3fd3-4331-84a1-5974299d6666"

[[env.share.r2_buckets]]
binding = "HTML_BUCKET"
bucket_name = "quick-html-sharing"
